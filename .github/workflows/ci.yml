name: PNS Mobile CI/CD

on:
  push:
    branches: ["main", "stage", "dev"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "stage", "dev"]

env:
  FLUTTER_VERSION: "3.41.6"
  JAVA_VERSION: "17"

jobs:
  # ─────────────────────────────────────────────
  # 1. Code Quality
  # ─────────────────────────────────────────────
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze --fatal-infos --fatal-warnings

  # ─────────────────────────────────────────────
  # 2. Build Android
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release --dart-define=API_URL=${{ secrets.PROD_API_URL }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delivery to WhatsApp
        if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
        env:
          URL: ${{ secrets.WHATSAPP_URL }}
          AUTH: ${{ secrets.WHATSAPP_AUTH }}
          PHONE: ${{ secrets.WHATSAPP_PHONE }}
        run: |
          # Get commit message and version
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //' | xargs)

          # Generate filename for delivery
          FILE_DATE=$(date +'%Y%m%d')
          FILENAME="${FILE_DATE}-pns-v${VERSION%+*}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$FILENAME"

          # Send via WhatsApp API
          curl -X POST "$URL" \
            -H "Authorization: $AUTH" \
            -F "caption=$COMMIT_MSG" \
            -F "phone=$PHONE" \
            -F "is_forwarded=false" \
            -F "file=@$FILENAME"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ─────────────────────────────────────────────
  # 3. Build iOS
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --dart-define=API_URL=${{ secrets.PROD_API_URL }}
